name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_DB_URL: "postgresql+psycopg://u:p@localhost/db"
      ZEFIX_USERNAME: u
      ZEFIX_PASSWORD: p
      MLFLOW_TRACKING_URI: "sqlite:///mlflow_ci.db"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests dags streamlit_app

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -v --tb=short
