x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY:-}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    APP_DB_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/app"
    ZEFIX_USERNAME: "${ZEFIX_USERNAME}"
    ZEFIX_PASSWORD: "${ZEFIX_PASSWORD}"
    ZEFIX_BASE_URL: "${ZEFIX_BASE_URL}"
    MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
    PYTHONPATH: "/opt/airflow/src"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src:ro
    - ./tests/fixtures:/opt/airflow/tests/fixtures:ro
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL 18 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin 4 ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    restart: unless-stopped
    environment:
      MLFLOW_BACKEND_STORE_URI: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_ALLOWED_HOSTS: "mlflow,mlflow:5000,localhost,localhost:5000,localhost:5001,127.0.0.1,127.0.0.1:5000,127.0.0.1:5001"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow init (one-shot) ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email "${AIRFLOW_ADMIN_USER}@localhost" || true
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USER: "${AIRFLOW_ADMIN_USER}"
      AIRFLOW_ADMIN_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD}"
    restart: "no"

  # ── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Webserver ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Streamlit UI ─────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    restart: unless-stopped
    environment:
      APP_DB_URL: "${APP_DB_URL}"
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
      ZEFIX_USERNAME: "${ZEFIX_USERNAME}"
      ZEFIX_PASSWORD: "${ZEFIX_PASSWORD}"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  mlflow_artifacts:
  airflow_logs:
